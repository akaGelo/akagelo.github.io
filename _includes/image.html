<!-- _includes/image.html -->
<div class="image-wrapper {{ include.align }}" >
    {% if include.url %}
    <a href="{{ include.url }}" title="{{ include.title }}" target="_blank">
    {% endif %}
        <img src="{{ site.url }}/{{ include.img }}" alt="{{ include.title }}" class="{{ include.size }}"/>
    {% if include.url %}
    </a>
    {% endif %}
    {% if include.caption %}
        <p class="image-caption">{{ include.caption }}</p>
    {% endif %}
</div>


<!--отключает обтекание-->
{% if include.clear %}
<div style="clear: {{ include.clear }}" ></div>
{% endif %}
